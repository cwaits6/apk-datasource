name: Container Build

on:
  release:
    types: [published]
  pull_request:
    branches: [main]
    # Only build the image when something that actually affects it changes.
    # Docs/CI-only PRs (e.g. Renovate action bumps) don't need a container build.
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - "deploy/docker/**"
      - ".github/workflows/container-build.yml"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    uses: krypsis-io/.github/.github/workflows/container-build.yml@main
    with:
      dockerfile: deploy/docker/Dockerfile
      platforms: linux/amd64,linux/arm64
      dockerhub-image: ${{ github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v') && 'docker.io/cwaits6/apk-datasource' || '' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
