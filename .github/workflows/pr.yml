name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    permissions:
      contents: read
      pull-requests: read
    uses: krypsis-io/.github/.github/workflows/dependency-review.yml@8e8d276392baa91e98d98f33ac6f3990c3869650 # main
  trivy:
    permissions:
      contents: read
    uses: krypsis-io/.github/.github/workflows/trivy.yml@8e8d276392baa91e98d98f33ac6f3990c3869650 # main
  semgrep:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: krypsis-io/.github/.github/workflows/semgrep.yml@8e8d276392baa91e98d98f33ac6f3990c3869650 # main
