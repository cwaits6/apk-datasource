services:
  apk-datasource:
    image: ghcr.io/cwaits6/apk-datasource:latest
    # To build locally instead of pulling the published image, comment out
    # the `image:` line above and uncomment the `build:` block below:
    # build:
    #   context: ../..
    #   dockerfile: deploy/docker/Dockerfile
    command:
      - serve
      - --port=3000
      - --refresh-interval=4h
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
